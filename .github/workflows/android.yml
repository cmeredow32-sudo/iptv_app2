name: Android APK Gurmak
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Wrapper bar barlamak
      run: |
        if [ ! -f gradlew ]; then
          sudo apt-get update && sudo apt-get install -y gradle
          gradle wrapper
        fi

    - name: Rugsat bermek
      run: chmod +x gradlew

    - name: APK-y gurmak
      run: ./gradlew assembleDebug

    - name: APK-y Ýüklemek
      uses: actions/upload-artifact@v4
      with:
        name: turkmen-iptv-debug-apk
        path: app/build/outputs/apk/debug/*.apk
